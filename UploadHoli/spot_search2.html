<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Search</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  margin: 0;
  padding: 20px;
}

input {
  padding: 10px;
  width: min(320px, 90vw);
  border-radius: 5px;
  border: none;
}

button {
  padding: 10px 20px;
  background: #1db954;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}

#status {
  margin-top: 12px;
  color: #cbd5e1;
}

#results {
  margin-top: 30px;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px 0;
}

.card {
  background: #222;
  padding: 15px;
  border-radius: 10px;
}

.card img {
  width: 100%;
  border-radius: 10px;
}

.card a {
  color: #1db954;
  text-decoration: none;
}
</style>
</head>
<body>
<h1>Music Search</h1>

<input id="query" placeholder="Search song...">
<button id="searchBtn" type="button">Search</button>
<div id="status">Ready</div>
<div id="results"></div>

<script>
const queryInput = document.getElementById("query");
const searchBtn = document.getElementById("searchBtn");
const statusEl = document.getElementById("status");
const resultsEl = document.getElementById("results");

searchBtn.addEventListener("click", search);
queryInput.addEventListener("keydown", (e) => {
  if (e.key === "Enter") search();
});

async function search() {
  const q = queryInput.value.trim();
  if (!q) {
    alert("Enter song name");
    return;
  }

  statusEl.textContent = "Searching...";
  resultsEl.innerHTML = "";

  try {
    const res = await fetch("/api/spotify/search?q=" + encodeURIComponent(q));
    const data = await res.json();

    if (!res.ok) {
      throw new Error((data && data.message) || "Search failed");
    }

    if (!data.items || data.items.length === 0) {
      statusEl.textContent = "No results found.";
      resultsEl.innerHTML = "<p>No results found</p>";
      return;
    }

    statusEl.textContent = "Found " + data.items.length + " songs.";
    data.items.forEach((song) => {
      const card = document.createElement("div");
      card.className = "card";

      const image = song.image || "";
      const name = song.name || "Unknown title";
      const artist = song.artist || "Unknown artist";
      const url = song.url || "#";

      card.innerHTML = `
        <img src="${image}" alt="${name}">
        <h3>${name}</h3>
        <p>${artist}</p>
        <a href="${url}" target="_blank" rel="noopener noreferrer">Open in Spotify</a>
      `;
      resultsEl.appendChild(card);
    });
  } catch (err) {
    statusEl.textContent = "Error: " + (err.message || "Could not fetch songs");
    resultsEl.innerHTML = "<p>Failed to load songs. Check backend and Spotify credentials.</p>";
  }
}
</script>
</body>
</html>
