services:
  - type: web
    name: holihub
    runtime: node
    rootDir: UploadHoli
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    disk:
      name: holihub-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: WISHES_FILE
        value: /var/data/wishes.json
